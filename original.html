<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>얼음 질감 구현</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .ice-container {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* 얼음 큐브 */
        .ice-block {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.25); /* 반투명한 베이스 */
            border: 2px solid rgba(255, 255, 255, 0.6); /* 얼음 가장자리 느낌 */
            border-radius: 20px;
            box-shadow:
                0 8px 32px 0 rgba(31, 38, 135, 0.37),
                inset 0 2px 5px rgba(255, 255, 255, 0.5); /* 내부 하이라이트 */
            backdrop-filter: blur(8px); /* 투명한 유리를 통과해 보이는 효과 */
            -webkit-backdrop-filter: blur(8px);
            transform: rotate(-10deg);
            transition: transform 0.3s ease;
        }

        .ice-block:hover {
            transform: rotate(0deg) scale(1.05);
        }

        /* 얼음 내부의 갈라진 텍스처 또는 기포 표현 */
        .ice-block::before {
            content: '';
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            background-image:
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.4) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,0.3) 2px, transparent 2px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* 얼음 표면의 반짝이는 하이라이트 */
        .ice-block::after {
            content: '';
            position: absolute;
            top: 5%; left: 5%;
            width: 40%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            border-radius: 50%;
            transform: rotate(-45deg);
        }
    </style>
</head>
<body>

    <div class="ice-container">
        <div class="ice-block"></div>
    </div>

</body>
</html>
