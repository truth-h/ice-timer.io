<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Timer</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            background:
                radial-gradient(ellipse at 20% 10%, #d8ecff 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, #b8dcf5 0%, transparent 50%),
                linear-gradient(135deg, #7fb3e0 0%, #a1c4fd 50%, #c2e9fb 100%);
            font-family: 'Segoe UI', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 15% 25%, rgba(255,255,255,0.5) 1px, transparent 2px),
                radial-gradient(circle at 75% 75%, rgba(255,255,255,0.4) 1px, transparent 2px),
                radial-gradient(circle at 45% 60%, rgba(255,255,255,0.3) 1px, transparent 2px);
            background-size: 200px 200px, 150px 150px, 250px 250px;
            pointer-events: none;
            z-index: 0;
        }

        /* 상단 목표 입력 */
        .goal-bar {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 700px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.3);
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(31, 60, 120, 0.15);
        }

        .goal-label {
            font-size: 28px;
            font-weight: 700;
            color: #1a3a6c;
            letter-spacing: 0.5px;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        .goal-input {
            flex: 1;
            min-width: 0;
            font-size: 20px;
            color: #1a3a6c;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(26, 58, 108, 0.3);
            padding: 6px 4px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .goal-input:focus {
            border-bottom-color: #1a3a6c;
        }

        .goal-input::placeholder {
            color: rgba(26, 58, 108, 0.4);
        }

        /* 시간 선택 */
        .time-controls {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-btn {
            padding: 10px 22px;
            font-size: 16px;
            font-weight: 600;
            color: #1a3a6c;
            background: rgba(255, 255, 255, 0.35);
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            border-radius: 999px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .time-btn:hover {
            background: rgba(255, 255, 255, 0.55);
            transform: translateY(-2px);
        }

        .time-btn.active {
            background: #1a3a6c;
            color: white;
            border-color: #1a3a6c;
            box-shadow: 0 6px 16px rgba(26, 58, 108, 0.35);
        }

        .action-btn {
            padding: 10px 28px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #4a90e2, #1a3a6c);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 6px 16px rgba(26, 58, 108, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 58, 108, 0.4);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 타이머 표시 */
        .timer-display {
            position: relative;
            z-index: 1;
            font-size: 42px;
            font-weight: 700;
            color: #1a3a6c;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }

        /* 얼음 컨테이너 */
        .ice-container {
            position: relative;
            z-index: 1;
            width: 320px;
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .ice-stage {
            position: relative;
            width: 280px;
            height: 320px;
        }

        /* 얼음 블록 */
        .ice-block {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg,
                    rgba(255, 255, 255, 0.45) 0%,
                    rgba(200, 230, 255, 0.25) 40%,
                    rgba(150, 200, 240, 0.2) 70%,
                    rgba(255, 255, 255, 0.35) 100%);
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            box-shadow:
                0 20px 50px -10px rgba(31, 60, 120, 0.45),
                0 8px 20px rgba(31, 60, 120, 0.25),
                inset 0 2px 6px rgba(255, 255, 255, 0.9),
                inset 0 -2px 8px rgba(120, 180, 220, 0.3),
                inset 4px 0 12px rgba(255, 255, 255, 0.3),
                inset -4px 0 12px rgba(150, 200, 240, 0.2);
            backdrop-filter: blur(10px) saturate(1.2);
            -webkit-backdrop-filter: blur(10px) saturate(1.2);
            overflow: hidden;
            /* 위에서부터 녹아내림 — clip-path를 JS로 조절 */
            clip-path: inset(0% 0 0 0 round 28px);
            transition: clip-path 1s linear, transform 0.3s ease;
        }

        .ice-block::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 25% 30%, rgba(255,255,255,0.7) 2px, transparent 3px),
                radial-gradient(circle at 65% 20%, rgba(255,255,255,0.5) 1.5px, transparent 2.5px),
                radial-gradient(circle at 80% 55%, rgba(255,255,255,0.6) 2.5px, transparent 3.5px),
                radial-gradient(circle at 40% 70%, rgba(255,255,255,0.4) 1px, transparent 2px),
                radial-gradient(circle at 15% 80%, rgba(255,255,255,0.5) 1.5px, transparent 2.5px),
                radial-gradient(circle at 90% 85%, rgba(255,255,255,0.4) 1px, transparent 2px),
                radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(180, 220, 250, 0.15) 70%);
            pointer-events: none;
        }

        .ice-block::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(115deg,
                    transparent 30%,
                    rgba(255, 255, 255, 0.4) 40%,
                    rgba(255, 255, 255, 0.7) 45%,
                    rgba(255, 255, 255, 0.4) 50%,
                    transparent 60%),
                linear-gradient(75deg,
                    transparent 60%,
                    rgba(255, 255, 255, 0.3) 70%,
                    rgba(255, 255, 255, 0.5) 75%,
                    transparent 80%);
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* 녹아내리는 물방울 (얼음 상단의 흐르는 효과) */
        .drips {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 28px;
        }

        .drip {
            position: absolute;
            top: 0;
            width: 6px;
            background: linear-gradient(180deg,
                rgba(255,255,255,0.6),
                rgba(180,220,250,0.4));
            border-radius: 0 0 50% 50% / 0 0 20% 20%;
            opacity: 0;
        }

        .ice-block.melting .drip {
            animation: drip-fall 2.5s ease-in infinite;
        }

        .drip:nth-child(1) { left: 18%; height: 30px; animation-delay: 0s !important; }
        .drip:nth-child(2) { left: 38%; height: 24px; animation-delay: 0.6s !important; }
        .drip:nth-child(3) { left: 58%; height: 36px; animation-delay: 1.1s !important; }
        .drip:nth-child(4) { left: 78%; height: 28px; animation-delay: 1.8s !important; }

        @keyframes drip-fall {
            0% { transform: translateY(-30px); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(80px); opacity: 0; }
        }

        /* 바닥 물웅덩이 */
        .puddle {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%) scaleX(0.3);
            width: 100%;
            height: 30px;
            background: radial-gradient(ellipse at center,
                rgba(180, 220, 250, 0.7) 0%,
                rgba(150, 200, 240, 0.4) 50%,
                transparent 80%);
            border-radius: 50%;
            transition: transform 1s ease;
            filter: blur(3px);
        }

        .ice-block.melting + .puddle {
            transform: translateX(-50%) scaleX(1);
        }

        /* 완료 메시지 */
        .complete-msg {
            position: relative;
            z-index: 1;
            font-size: 20px;
            font-weight: 600;
            color: #1a3a6c;
            opacity: 0;
            transition: opacity 0.5s ease;
            min-height: 28px;
        }

        .complete-msg.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="goal-bar">
        <span class="goal-label">My Goal:</span>
        <input type="text" class="goal-input" id="goalInput" placeholder="오늘의 목표를 입력하세요...">
    </div>

    <div class="time-controls">
        <button class="time-btn" data-min="25">25분</button>
        <button class="time-btn" data-min="30">30분</button>
        <button class="time-btn" data-min="45">45분</button>
        <button class="time-btn" data-min="60">60분</button>
        <button class="action-btn" id="startBtn">시작</button>
        <button class="action-btn" id="resetBtn" style="background: linear-gradient(135deg, #8aa8cc, #5a7ba8);">리셋</button>
    </div>

    <div class="timer-display" id="timerDisplay">25:00</div>

    <div class="ice-container">
        <div class="ice-stage">
            <div class="ice-block" id="iceBlock">
                <div class="drips">
                    <div class="drip"></div>
                    <div class="drip"></div>
                    <div class="drip"></div>
                    <div class="drip"></div>
                </div>
            </div>
            <div class="puddle"></div>
        </div>
    </div>

    <div class="complete-msg" id="completeMsg">얼음이 다 녹았어요! 목표 완료 🧊</div>

    <script>
        const timeBtns = document.querySelectorAll('.time-btn');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const iceBlock = document.getElementById('iceBlock');
        const completeMsg = document.getElementById('completeMsg');

        let selectedMinutes = 25;
        let remainingSeconds = 25 * 60;
        let totalSeconds = 25 * 60;
        let timerId = null;
        let isRunning = false;

        function setActiveButton(minutes) {
            timeBtns.forEach(btn => {
                btn.classList.toggle('active', Number(btn.dataset.min) === minutes);
            });
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateIce() {
            const progress = 1 - (remainingSeconds / totalSeconds);
            const meltPercent = (progress * 100).toFixed(2);
            iceBlock.style.clipPath = `inset(${meltPercent}% 0 0 0 round 28px)`;
        }

        function selectTime(minutes) {
            if (isRunning) return;
            selectedMinutes = minutes;
            totalSeconds = minutes * 60;
            remainingSeconds = totalSeconds;
            timerDisplay.textContent = formatTime(remainingSeconds);
            setActiveButton(minutes);
            iceBlock.style.clipPath = `inset(0% 0 0 0 round 28px)`;
            iceBlock.classList.remove('melting');
            completeMsg.classList.remove('show');
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            iceBlock.classList.add('melting');
            startBtn.disabled = true;
            timeBtns.forEach(b => b.disabled = true);

            timerId = setInterval(() => {
                remainingSeconds--;
                timerDisplay.textContent = formatTime(remainingSeconds);
                updateIce();

                if (remainingSeconds <= 0) {
                    clearInterval(timerId);
                    isRunning = false;
                    iceBlock.classList.remove('melting');
                    completeMsg.classList.add('show');
                    startBtn.disabled = false;
                    timeBtns.forEach(b => b.disabled = false);
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            remainingSeconds = totalSeconds;
            timerDisplay.textContent = formatTime(remainingSeconds);
            iceBlock.style.clipPath = `inset(0% 0 0 0 round 28px)`;
            iceBlock.classList.remove('melting');
            completeMsg.classList.remove('show');
            startBtn.disabled = false;
            timeBtns.forEach(b => b.disabled = false);
        }

        timeBtns.forEach(btn => {
            btn.addEventListener('click', () => selectTime(Number(btn.dataset.min)));
        });
        startBtn.addEventListener('click', startTimer);
        resetBtn.addEventListener('click', resetTimer);

        selectTime(25);
    </script>
</body>
</html>
